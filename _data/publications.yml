  title: "Running six open-source cofolding models on AWS: lessons from a compute perspective"
  desc: "A deep-dive I co-wrote after wrestling six open-source cofolding models onto AWS — asking not which is most accurate, but which model-and-instance combinations are actually worth the compute before you scale. We used PROTAC ternary complexes as our stress test. Written with Andrés Florian and Daniel Sabogal for Loka Engineering."
